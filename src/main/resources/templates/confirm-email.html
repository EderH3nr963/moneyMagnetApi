<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Confirmação de e-mail - Money Magnet</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 30px;">
<div style="max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 8px;">
    <h1 style="color: #4CAF50; text-align: center;">Money Magnet</h1>
    <p>Olá, <strong>{{username}}</strong>!</p>
    <p>Recebemos uma solicitação para alterar o e-mail da sua conta para <strong>{{new_email}}</strong>.</p>
    <p style="text-align: center;">
        <a href="{{confirm_uri}}" style="display: inline-block; padding: 14px 28px; background: #4CAF50; color: white; text-decoration: none; border-radius: 6px;">Confirmar novo e-mail</a>
    </p>
    <p>Este link expira em 15 minutos e só pode ser usado uma vez. Se você não solicitou a alteração, ignore esta mensagem.</p>
</div>
</body>
</html>
